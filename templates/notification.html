<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VTMoo — Buy Data</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;800;900&family=Barlow+Condensed:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-family: 'Barlow Condensed', sans-serif;
      background: #ffffff;
      color: #000000;
    }

    /* ── COW PATTERN BG ── */
    #bg-canvas-wrapper {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      min-width: 100%;
      min-height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    #bg-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    #bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 0%, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.3) 75%);
    }

    /* ── PAGE FRAME ── */
    .app {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding: 22px 20px 60px;
      display: flex;
      flex-direction: column;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.05s forwards;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .icon-btn:hover {
      background: rgba(0, 0, 0, 0.12);
      border-color: rgba(0, 0, 0, 0.25);
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: #1a1a1a;
    }

    .topbar-title {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.01em;
      color: #000000;
    }

    /* ── SECTION HEADERS ── */
    .section-head {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #555555;
      margin: 0 0 14px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.12s forwards;
    }

    .section-head.spaced {
      margin-top: 24px;
    }

    /* ── NETWORK CAROUSEL ── */
    .carousel-wrap {
      position: relative;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.18s forwards;
    }

    .carousel {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 6px 0 18px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .carousel::before,
    .carousel::after {
      content: '';
      flex: 0 0 calc(50% - 60px);
    }

    .network-card {
      flex: 0 0 96px;
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: scale(0.8);
      opacity: 0.4;
    }

    .network-card.active {
      transform: scale(1);
      opacity: 1;
    }

    .network-logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: box-shadow 0.35s ease, border-color 0.35s ease;
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #999999;
    }

    .network-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .network-card.active .network-logo {
      border-color: rgba(0, 0, 0, 0.35);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.2);
    }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.22s forwards;
    }

    .carousel-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
    }

    .carousel-dot.active {
      background: #000000;
      width: 18px;
      border-radius: 4px;
    }

    /* ── FORM CARD ── */
    .form-card {
      border-radius: 20px;
      padding: 22px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.28s forwards;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-label {
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888888;
      margin-bottom: 8px;
      display: block;
    }

    /* ── PLAN TYPE TABS ── */
    .plan-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .plan-tab {
      flex: 1;
      min-width: 0;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-align: center;
      color: #000000;
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      padding: 11px 6px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .plan-tab:hover {
      background: rgba(0, 0, 0, 0.08);
    }

    .plan-tab.selected {
      background: #000000;
      color: #ffffff;
      border-color: #000000;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    @media (max-width: 380px) {
      .plan-tabs {
        flex-wrap: wrap;
      }
      .plan-tab {
        flex: 0 0 calc(50% - 4px);
      }
    }

    /* ── SELECT ── */
    .select-wrap {
      position: relative;
    }

    .select-wrap select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: rgba(0, 0, 0, 0.04);
      border-radius: 14px;
      padding: 14px 40px 14px 16px;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #000000;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .select-wrap select:focus {
      border-color: rgba(0, 0, 0, 0.4);
    }

    .select-wrap select:disabled {
      color: #aaaaaa;
      cursor: not-allowed;
    }

    .select-wrap svg {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: #888888;
      pointer-events: none;
    }

    /* ── TEXT INPUT ── */
    .text-input {
      width: 100%;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: rgba(0, 0, 0, 0.04);
      border-radius: 14px;
      padding: 14px 16px;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #000000;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .text-input:focus {
      border-color: rgba(0, 0, 0, 0.4);
    }

    .text-input::placeholder {
      color: #c4c4c4;
      font-weight: 500;
    }

    /* remove number spinners + letter spacing for PIN */
    .text-input[type=number]::-webkit-outer-spin-button,
    .text-input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .text-input[type=number] {
      -moz-appearance: textfield;
    }

    .pin-input {
      letter-spacing: 0.6em;
      text-align: center;
      font-size: 20px;
    }

    /* ── TOGGLE ROW ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toggle-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toggle-title {
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: #000000;
    }

    .toggle-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #999999;
    }

    .switch {
      position: relative;
      width: 46px;
      height: 26px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .switch-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 999px;
      transition: background 0.25s ease;
    }

    .switch-slider::before {
      content: '';
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background: #ffffff;
      border-radius: 50%;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    .switch input:checked + .switch-slider {
      background: #000000;
    }

    .switch input:checked + .switch-slider::before {
      transform: translateX(20px);
    }

    /* ── SUBMIT ── */
    .submit-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: #ffffff;
      background: #000000;
      border: none;
      border-radius: 16px;
      padding: 18px;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.36s forwards;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      background: #1a1a1a;
    }

    .submit-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .submit-btn svg {
      width: 18px;
      height: 18px;
      stroke: #ffffff;
    }
  </style>
</head>

<body>

  <div id="bg-canvas-wrapper">
    <canvas id="bg-canvas"></canvas>
  </div>
  <div id="bg-overlay"></div>

  <div class="app">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="icon-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

    <!-- SELECT NETWORK -->

          </div>
        </div>
      </div>
    </div>
    <div class="carousel-dots" id="carouselDots"></div>

    <!-- FORM -->
    <div class="form-card">

      <!-- PLAN TYPE -->
      <div>
        <span class="field-label">Plan Type</span>
        <div class="plan-tabs" id="planTabs">
          <div class="plan-tab selected" data-plan="sme">SME</div>
          <div class="plan-tab" data-plan="corporate">Corporate Gifting</div>

      <div>

      <div class="toggle-row">
        <div class="toggle-text">

          <span class="toggle-sub">Use if number lookup fails</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="bypassToggle" />
          <span class="switch-slider"></span>
        </label>
      </div>

      <!-- TRANSACTION PIN -->
      <div>
        <span class="field-label">Transaction PIN</span>
        <input type="password" class="text-input pin-input" id="pinInput" placeholder="••••" maxlength="4" inputmode="numeric" pattern="[0-9]*" />
      </div>

    </div>

    <!-- SUBMIT -->
    <button class="submit-btn" id="purchaseBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="10" rx="2" />
        <path d="M6 11h.01M10 11h.01M14 11h.01" />
      </svg>
      Purchase Data
    </button>

  </div>

  <script>
    /* ── COW PATTERN BG ── */
    function drawCowPattern(ctx, width, height, seed) {
      const BLACK = '#000000';
      const WHITE = '#ffffff';

      function mulberry32(a) {
        return function () {
          var t = a += 0x6D2B79F5;
          t = Math.imul(t ^ t >>> 15, t | 1);
          t ^= t + Math.imul(t ^ t >>> 7, t | 61);
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
      }

      const rand = mulberry32(seed || 12345);

      ctx.fillStyle = WHITE;
      ctx.fillRect(0, 0, width, height);

      const numBlobs = 25;

      for (let i = 0; i < numBlobs; i++) {
        const cx = rand() * width;
        const cy = rand() * height;
        const baseRadius = 80 + rand() * 200;

        ctx.fillStyle = BLACK;
        ctx.beginPath();

        const points = 8 + Math.floor(rand() * 6);
        const coords = [];

        for (let p = 0; p < points; p++) {
          const angle = (p / points) * Math.PI * 2;
          const r = baseRadius * (0.6 + rand() * 0.8);
          const wobble = (rand() - 0.5) * 40;
          coords.push({
            x: cx + Math.cos(angle) * r + wobble,
            y: cy + Math.sin(angle) * r + wobble
          });
        }

        for (let p = 0; p < coords.length; p++) {
          const curr = coords[p];
          const next = coords[(p + 1) % coords.length];
          const midX = (curr.x + next.x) / 2;
          const midY = (curr.y + next.y) / 2;
          if (p === 0) {
            ctx.moveTo(midX, midY);
          } else {
            ctx.quadraticCurveTo(curr.x, curr.y, midX, midY);
          }
        }

        ctx.closePath();
        ctx.fill();
      }

      for (let i = 0; i < 15; i++) {
        const sx = rand() * width;
        const sy = rand() * height;
        const sr = 10 + rand() * 30;
        ctx.fillStyle = BLACK;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d', { alpha: false });

      function resize() {
        const w = Math.max(window.screen.width, window.innerWidth, document.documentElement.clientWidth);
        const h = Math.max(window.screen.height, window.innerHeight, document.documentElement.clientHeight);

        canvas.width = w;
        canvas.height = h;

        const wrapper = document.getElementById('bg-canvas-wrapper');
        wrapper.style.width = w + 'px';
        wrapper.style.height = h + 'px';

        drawCowPattern(ctx, w, h, 12345);
      }

      resize();

      window.addEventListener('resize', resize);
      window.addEventListener('orientationchange', function () {
        setTimeout(resize, 300);
      });
      window.visualViewport && window.visualViewport.addEventListener('resize', function () {
        setTimeout(resize, 100);
      });
    })();

    /* ── NETWORK CAROUSEL ── */

          { value: '10gb_gift_air', label: '10GB — 30 Days — ₦3,300' }
        ]
      }
    };

    (function () {
      const carousel = document.getElementById('networkCarousel');
      const cards = Array.from(carousel.querySelectorAll('.network-card'));
      const dotsWrap = document.getElementById('carouselDots');
      const planTabs = Array.from(document.querySelectorAll('.plan-tab'));
      const dataPlanSelect = document.getElementById('dataPlanSelect');
      const phoneInput = document.getElementById('phoneInput');
      const bypassToggle = document.getElementById('bypassToggle');
      const pinInput = document.getElementById('pinInput');
      const purchaseBtn = document.getElementById('purchaseBtn');

      let currentNetwork = cards[0].dataset.network;
      let currentPlanType = 'sme';

      // build dots
      cards.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dotsWrap.appendChild(dot);
      });
      const dots = Array.from(dotsWrap.children);

      function setActiveCard(index) {
        cards.forEach((c, i) => c.classList.toggle('active', i === index));
        dots.forEach((d, i) => d.classList.toggle('active', i === index));
        currentNetwork = cards[index].dataset.network;
        populateDataPlans();
        validateForm();
      }

      function populateDataPlans() {
        const plans = (DATA_PLANS[currentPlanType] && DATA_PLANS[currentPlanType][currentNetwork]) || [];
        dataPlanSelect.innerHTML = '<option value="">Select data plan</option>';
        plans.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.value;
          opt.textContent = p.label;
          dataPlanSelect.appendChild(opt);
        });
        dataPlanSelect.disabled = plans.length === 0;
      }

      // click to select
      cards.forEach((card, i) => {
        card.addEventListener('click', () => {
          setActiveCard(i);
          card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        });
      });

      // scroll-based active detection
      let scrollTimeout;
      carousel.addEventListener('scroll', () => {
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
          const center = carousel.scrollLeft + carousel.clientWidth / 2;
          let closestIndex = 0;
          let closestDist = Infinity;
          cards.forEach((card, i) => {
            const cardCenter = card.offsetLeft + card.offsetWidth / 2;
            const dist = Math.abs(cardCenter - center);
            if (dist < closestDist) {
              closestDist = dist;
              closestIndex = i;
            }
          });
          setActiveCard(closestIndex);
        }, 80);
      });

      // plan type tabs
      planTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          planTabs.forEach(t => t.classList.remove('selected'));
          tab.classList.add('selected');
          currentPlanType = tab.dataset.plan;
          populateDataPlans();
          validateForm();
        });
      });

      function validateForm() {
        const phoneOk = bypassToggle.checked || /^0\d{10}$/.test(phoneInput.value.trim());
        const planOk = !!dataPlanSelect.value;
        const pinOk = /^\d{4}$/.test(pinInput.value.trim());
        purchaseBtn.disabled = !(phoneOk && planOk && pinOk);
      }

      dataPlanSelect.addEventListener('change', validateForm);
      phoneInput.addEventListener('input', () => {
        phoneInput.value = phoneInput.value.replace(/\D/g, '').slice(0, 11);
        validateForm();
      });
      bypassToggle.addEventListener('change', validateForm);
      pinInput.addEventListener('input', () => {
        pinInput.value = pinInput.value.replace(/\D/g, '').slice(0, 4);
        validateForm();
      });

      purchaseBtn.addEventListener('click', () => {
        if (purchaseBtn.disabled) return;
        const planText = dataPlanSelect.options[dataPlanSelect.selectedIndex].textContent;
        alert('Purchasing ' + planText + ' on ' + currentNetwork + ' for ' + phoneInput.value + '...');
      });

      // init
      setActiveCard(0);

      // center first card on load
      requestAnimationFrame(() => {
        const first = cards[0];
        carousel.scrollLeft = first.offsetLeft - (carousel.clientWidth - first.offsetWidth) / 2;
      });
    })();

    /* ── BACK BUTTON ── */
    document.getElementById('backBtn').addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      }
    });
  </script>
</body>

</html>
