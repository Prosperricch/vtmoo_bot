<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VTMoo — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;800;900&family=Barlow+Condensed:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-family: 'Barlow Condensed', sans-serif;
      background: #ffffff;
      color: #000000;
    }

    /* ── COW PATTERN BG ── */
    #bg-canvas-wrapper {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      min-width: 100%;
      min-height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    #bg-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    #bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 0%, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.3) 75%);
    }

    /* ── PAGE FRAME ── */
    .app {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding: 22px 20px 60px;
      display: flex;
      flex-direction: column;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.05s forwards;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .icon-btn:hover {
      background: rgba(0, 0, 0, 0.12);
      border-color: rgba(0, 0, 0, 0.25);
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: #1a1a1a;
    }

    .topbar-title {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.01em;
      color: #000000;
    }

    /* ── PROFILE CARD ── */
    .profile-card {
      border-radius: 20px;
      padding: 32px 22px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.12s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
    }

    .avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.2);
    }

    .avatar svg {
      width: 40px;
      height: 40px;
      stroke: #ffffff;
    }

    .profile-name {
      font-family: 'Barlow', sans-serif;
      font-weight: 900;
      font-size: 24px;
      letter-spacing: -0.01em;
      color: #000000;
    }

    .account-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #ffffff;
      background: #000000;
      border-radius: 999px;
      padding: 9px 18px;
    }

    .account-type-badge svg {
      width: 14px;
      height: 14px;
      stroke: #ffffff;
    }

    /* ── INFO LIST ── */
    .info-section {
      margin-top: 24px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }

    .section-head {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #000000;
      margin: 0 0 14px;
    }

    .section-head.spaced {
      margin-top: 24px;
    }

    .info-card {
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
    }

    .info-row + .info-row {
      border-top: 1px solid rgba(0, 0, 0, 0.08);
    }

    .info-row-label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #000000;
    }

    .info-row-label svg {
      width: 18px;
      height: 18px;
      stroke: #999999;
      flex-shrink: 0;
    }

    .info-row-value {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 14px;
      color: #000000;
      text-align: right;
    }

    /* ── SET PIN CARD ── */
    .pin-card {
      border-radius: 20px;
      padding: 22px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-label {
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #000000;
      margin-bottom: 8px;
      display: block;
    }

    .pin-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: rgba(0, 0, 0, 0.04);
      border-radius: 14px;
      padding: 14px 16px;
      transition: border-color 0.2s ease;
    }

    .pin-input-row:focus-within {
      border-color: rgba(0, 0, 0, 0.4);
    }

    .pin-input-row input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 0.6em;
      text-align: center;
      color: #000000;
      min-width: 0;
    }

    .pin-input-row input::placeholder {
      color: #c4c4c4;
      letter-spacing: 0.6em;
    }

    .pin-input-row input[type=number]::-webkit-outer-spin-button,
    .pin-input-row input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .pin-input-row input[type=number] {
      -moz-appearance: textfield;
    }

    .pin-eye-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .pin-eye-btn:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    .pin-eye-btn svg {
      width: 17px;
      height: 17px;
      stroke: #1a1a1a;
    }

    .pin-hint {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 0.02em;
      color: #999999;
      line-height: 1.5;
      margin-top: -8px;
    }

    .pin-save-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 0.05em;
      color: #ffffff;
      background: #000000;
      border: none;
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
    }

    .pin-save-btn:hover {
      transform: translateY(-2px);
      background: #1a1a1a;
    }

    .pin-save-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .pin-save-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .pin-save-btn svg {
      width: 16px;
      height: 16px;
      stroke: #ffffff;
    }

    .pin-status {
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-align: center;
      color: #999999;
      min-height: 16px;
      transition: color 0.2s ease;
    }

    .pin-status.success {
      color: #000000;
    }
  </style>
</head>

<body>

  <div id="bg-canvas-wrapper">
    <canvas id="bg-canvas"></canvas>
  </div>
  <div id="bg-overlay"></div>

  <div class="app">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="icon-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </div>
      <div class="topbar-title">Profile</div>
    </div>

    <!-- PROFILE CARD -->
    <div class="profile-card">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 21c0-3.87 3.58-7 8-7s8 3.13 8 7" />
        </svg>
      </div>
      <div class="profile-name">Adaeze Okafor</div>
      <div class="account-type-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12l-4.6 9-5.4-3-5.4 3L2 12l4.6-9 5.4 3 5.4-3z" />
          <path d="M12 6v12" />
        </svg>
        Student Account
      </div>
    </div>

    <!-- ACCOUNT INFO -->
    <div class="info-section">
      <div class="section-head">Account Details</div>
      <div class="info-card">
        <div class="info-row">
          <div class="info-row-label">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4" />
              <path d="M4 21c0-3.87 3.58-7 8-7s8 3.13 8 7" />
            </svg>
            Full Name
          </div>
          <div class="info-row-value">Adaeze Okafor</div>
        </div>
        <div class="info-row">
          <div class="info-row-label">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 12l-4.6 9-5.4-3-5.4 3L2 12l4.6-9 5.4 3 5.4-3z" />
              <path d="M12 6v12" />
            </svg>
            Account Type
          </div>
          <div class="info-row-value">Student Account</div>
        </div>
      </div>
    </div>

    <!-- SET TRANSACTION PIN -->
    <div class="info-section">
      <div class="section-head spaced">Set Transaction PIN</div>
      <div class="pin-card">

        <div>
          <span class="field-label">New 4-Digit PIN</span>
          <div class="pin-input-row">
            <input type="password" id="newPin" placeholder="••••" maxlength="4" inputmode="numeric" pattern="[0-9]*" />
            <div class="pin-eye-btn" id="toggleNewPin" title="Show/hide PIN">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </div>
          </div>
        </div>

        <div>
          <span class="field-label">Confirm PIN</span>
          <div class="pin-input-row">
            <input type="password" id="confirmPin" placeholder="••••" maxlength="4" inputmode="numeric" pattern="[0-9]*" />
            <div class="pin-eye-btn" id="toggleConfirmPin" title="Show/hide PIN">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </div>
          </div>
        </div>

        <div class="pin-hint">Your PIN is used to authorize transactions like data purchases and wallet transfers. Keep it private.</div>

        <button class="pin-save-btn" id="savePinBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5" />
          </svg>
          Save PIN
        </button>

        <div class="pin-status" id="pinStatus"></div>

      </div>
    </div>

  </div>

  <script>
    /* ── COW PATTERN BG ── */
    function drawCowPattern(ctx, width, height, seed) {
      const BLACK = '#000000';
      const WHITE = '#ffffff';

      function mulberry32(a) {
        return function () {
          var t = a += 0x6D2B79F5;
          t = Math.imul(t ^ t >>> 15, t | 1);
          t ^= t + Math.imul(t ^ t >>> 7, t | 61);
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
      }

      const rand = mulberry32(seed || 12345);

      ctx.fillStyle = WHITE;
      ctx.fillRect(0, 0, width, height);

      const numBlobs = 25;

      for (let i = 0; i < numBlobs; i++) {
        const cx = rand() * width;
        const cy = rand() * height;
        const baseRadius = 80 + rand() * 200;

        ctx.fillStyle = BLACK;
        ctx.beginPath();

        const points = 8 + Math.floor(rand() * 6);
        const coords = [];

        for (let p = 0; p < points; p++) {
          const angle = (p / points) * Math.PI * 2;
          const r = baseRadius * (0.6 + rand() * 0.8);
          const wobble = (rand() - 0.5) * 40;
          coords.push({
            x: cx + Math.cos(angle) * r + wobble,
            y: cy + Math.sin(angle) * r + wobble
          });
        }

        for (let p = 0; p < coords.length; p++) {
          const curr = coords[p];
          const next = coords[(p + 1) % coords.length];
          const midX = (curr.x + next.x) / 2;
          const midY = (curr.y + next.y) / 2;
          if (p === 0) {
            ctx.moveTo(midX, midY);
          } else {
            ctx.quadraticCurveTo(curr.x, curr.y, midX, midY);
          }
        }

        ctx.closePath();
        ctx.fill();
      }

      for (let i = 0; i < 15; i++) {
        const sx = rand() * width;
        const sy = rand() * height;
        const sr = 10 + rand() * 30;
        ctx.fillStyle = BLACK;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d', { alpha: false });

      function resize() {
        const w = Math.max(window.screen.width, window.innerWidth, document.documentElement.clientWidth);
        const h = Math.max(window.screen.height, window.innerHeight, document.documentElement.clientHeight);

        canvas.width = w;
        canvas.height = h;

        const wrapper = document.getElementById('bg-canvas-wrapper');
        wrapper.style.width = w + 'px';
        wrapper.style.height = h + 'px';

        drawCowPattern(ctx, w, h, 12345);
      }

      resize();

      window.addEventListener('resize', resize);
      window.addEventListener('orientationchange', function () {
        setTimeout(resize, 300);
      });
      window.visualViewport && window.visualViewport.addEventListener('resize', function () {
        setTimeout(resize, 100);
      });
    })();

    /* ── BACK BUTTON ── */
    document.getElementById('backBtn').addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      }
    });

    /* ── SET TRANSACTION PIN ── */
    (function () {
      const newPin = document.getElementById('newPin');
      const confirmPin = document.getElementById('confirmPin');
      const toggleNewPin = document.getElementById('toggleNewPin');
      const toggleConfirmPin = document.getElementById('toggleConfirmPin');
      const savePinBtn = document.getElementById('savePinBtn');
      const pinStatus = document.getElementById('pinStatus');

      const EYE_OPEN = '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" /><circle cx="12" cy="12" r="3" /></svg>';
      const EYE_CLOSED = '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0112 19c-7 0-11-7-11-7a18.5 18.5 0 014.06-5.06M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 7 11 7a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" /><path d="M1 1l22 22" /></svg>';

      function sanitizePin(input) {
        input.value = input.value.replace(/\D/g, '').slice(0, 4);
      }

      function setupToggle(input, btn) {
        btn.addEventListener('click', () => {
          if (input.type === 'password') {
            input.type = 'text';
            btn.innerHTML = EYE_CLOSED;
          } else {
            input.type = 'password';
            btn.innerHTML = EYE_OPEN;
          }
        });
      }

      setupToggle(newPin, toggleNewPin);
      setupToggle(confirmPin, toggleConfirmPin);

      function validate() {
        const a = newPin.value.trim();
        const b = confirmPin.value.trim();
        const valid = /^\d{4}$/.test(a) && /^\d{4}$/.test(b);
        savePinBtn.disabled = !valid;
        return { a, b, valid };
      }

      [newPin, confirmPin].forEach(input => {
        input.addEventListener('input', () => {
          sanitizePin(input);
          pinStatus.textContent = '';
          pinStatus.classList.remove('success');
          validate();
        });
      });

      savePinBtn.addEventListener('click', () => {
        const { a, b, valid } = validate();
        if (!valid) return;

        if (a !== b) {
          pinStatus.textContent = "PINs don't match. Please try again.";
          pinStatus.classList.remove('success');
          return;
        }

        pinStatus.textContent = 'Transaction PIN saved successfully.';
        pinStatus.classList.add('success');
        newPin.value = '';
        confirmPin.value = '';
        savePinBtn.disabled = true;
      });
    })();
  </script>
</body>

</html>`
