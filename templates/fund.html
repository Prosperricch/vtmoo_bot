<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VTMoo — Fund Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;800;900&family=Barlow+Condensed:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-family: 'Barlow Condensed', sans-serif;
      background: #ffffff;
      color: #000000;
    }

    /* ── COW PATTERN BG ── */
    #bg-canvas-wrapper {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      min-width: 100%;
      min-height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    #bg-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    #bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 0%, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.3) 75%);
    }

    /* ── PAGE FRAME ── */
    .app {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding: 22px 20px 60px;
      display: flex;
      flex-direction: column;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.05s forwards;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .icon-btn:hover {
      background: rgba(0, 0, 0, 0.12);
      border-color: rgba(0, 0, 0, 0.25);
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: #1a1a1a;
    }

    .topbar-title {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.01em;
      color: #000000;
    }

    /* ── BALANCE CARD ── */
    .balance-card {
      border-radius: 20px;
      padding: 24px 22px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.12s forwards;
      position: relative;
      margin-bottom: 24px;
    }

    .balance-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .balance-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.06em;
      color: #666666;
    }

    .balance-label-row svg {
      width: 18px;
      height: 18px;
      stroke: #999999;
    }

    .balance-amount {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 7.5vw, 34px);
      color: #000000;
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .balance-decimals {
      color: #999999;
    }

    .balance-naira {
      font-weight: 800;
      color: #000000;
      margin-right: 2px;
    }

    .balance-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888888;
    }

    /* ── SECTION HEADERS ── */
    .section-head {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #555555;
      margin: 0 0 14px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }

    /* ── AMOUNT INPUT CARD ── */
    .amount-card {
      border-radius: 20px;
      padding: 22px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.26s forwards;
      margin-bottom: 24px;
    }

    .amount-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.12);
      padding: 14px 16px;
      margin-bottom: 18px;
    }

    .amount-input-row .naira-sign {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 24px;
      color: #000000;
    }

    .amount-input-row input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 24px;
      color: #000000;
      letter-spacing: -0.01em;
      min-width: 0;
    }

    .amount-input-row input::placeholder {
      color: #c4c4c4;
    }

    /* remove number spinners */
    .amount-input-row input::-webkit-outer-spin-button,
    .amount-input-row input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .amount-input-row input[type=number] {
      -moz-appearance: textfield;
    }

    /* ── QUICK AMOUNT GRID ── */
    .quick-amounts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .amount-chip {
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #000000;
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent;
    }

    .amount-chip:hover {
      background: rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .amount-chip.selected {
      background: #000000;
      color: #ffffff;
      border-color: #000000;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    /* ── SUMMARY CARD ── */
    .summary-card {
      border-radius: 20px;
      padding: 22px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.34s forwards;
      margin-bottom: 24px;
    }

    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      color: #555555;
      padding: 10px 0;
    }

    .summary-row span:last-child {
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      color: #000000;
    }

    .summary-row + .summary-row {
      border-top: 1px solid rgba(0, 0, 0, 0.08);
    }

    .summary-row.total {
      margin-top: 4px;
      padding-top: 16px;
      border-top: 1px solid rgba(0, 0, 0, 0.15);
    }

    .summary-row.total span:first-child {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #000000;
    }

    .summary-row.total span:last-child {
      font-size: 20px;
      font-weight: 800;
    }

    /* ── FUND BUTTON ── */
    .fund-submit-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: #ffffff;
      background: #000000;
      border: none;
      border-radius: 16px;
      padding: 18px;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.42s forwards;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    .fund-submit-btn:hover {
      transform: translateY(-2px);
      background: #1a1a1a;
    }

    .fund-submit-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .fund-submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .fund-submit-btn svg {
      width: 18px;
      height: 18px;
      stroke: #ffffff;
    }

    .paystack-badge {
      text-align: center;
      margin-top: 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999999;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.5s forwards;
    }
  </style>
</head>

<body>

  <div id="bg-canvas-wrapper">
    <canvas id="bg-canvas"></canvas>
  </div>
  <div id="bg-overlay"></div>

  <div class="app">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="icon-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </div>
      <div class="topbar-title">Fund Wallet</div>
    </div>

    <!-- CURRENT BALANCE -->
    <div class="balance-card">
      <div class="balance-label-row">
        <span class="balance-label">Current Balance</span>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </div>
      <div class="balance-amount"><span class="balance-naira">₦</span>0<span class="balance-decimals">.00</span></div>
      <div class="balance-sub">Available for VTU services</div>
    </div>

    <!-- AMOUNT TO FUND -->
    <div class="section-head">Amount to Fund</div>
    <div class="amount-card">
      <div class="amount-input-row">
        <span class="naira-sign">₦</span>
        <input type="number" id="amountInput" placeholder="0.00" min="0" inputmode="decimal" />
      </div>

      <div class="quick-amounts">
        <div class="amount-chip" data-amount="1000">₦1,000</div>
        <div class="amount-chip" data-amount="2000">₦2,000</div>
        <div class="amount-chip" data-amount="5000">₦5,000</div>
        <div class="amount-chip" data-amount="10000">₦10,000</div>
        <div class="amount-chip" data-amount="20000">₦20,000</div>
        <div class="amount-chip" data-amount="50000">₦50,000</div>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="summary-card">
      <div class="summary-row">
        <span>Amount</span>
        <span id="sumAmount">₦0.00</span>
      </div>
      <div class="summary-row">
        <span>Processing Fee (5%)</span>
        <span id="sumFee">₦0.00</span>
      </div>
      <div class="summary-row total">
        <span>You'll Pay</span>
        <span id="sumTotal">₦0.00</span>
      </div>
    </div>

    <!-- SUBMIT -->
    <button class="fund-submit-btn" id="fundSubmitBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2" />
        <path d="M2 10h20" />
      </svg>
      Fund Wallet with Paystack
    </button>

    <div class="paystack-badge">Secured by Paystack</div>

  </div>

  <script>
    /* ── COW PATTERN BG ── */
    function drawCowPattern(ctx, width, height, seed) {
      const BLACK = '#000000';
      const WHITE = '#ffffff';

      function mulberry32(a) {
        return function () {
          var t = a += 0x6D2B79F5;
          t = Math.imul(t ^ t >>> 15, t | 1);
          t ^= t + Math.imul(t ^ t >>> 7, t | 61);
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
      }

      const rand = mulberry32(seed || 12345);

      ctx.fillStyle = WHITE;
      ctx.fillRect(0, 0, width, height);

      const numBlobs = 25;

      for (let i = 0; i < numBlobs; i++) {
        const cx = rand() * width;
        const cy = rand() * height;
        const baseRadius = 80 + rand() * 200;

        ctx.fillStyle = BLACK;
        ctx.beginPath();

        const points = 8 + Math.floor(rand() * 6);
        const coords = [];

        for (let p = 0; p < points; p++) {
          const angle = (p / points) * Math.PI * 2;
          const r = baseRadius * (0.6 + rand() * 0.8);
          const wobble = (rand() - 0.5) * 40;
          coords.push({
            x: cx + Math.cos(angle) * r + wobble,
            y: cy + Math.sin(angle) * r + wobble
          });
        }

        for (let p = 0; p < coords.length; p++) {
          const curr = coords[p];
          const next = coords[(p + 1) % coords.length];
          const midX = (curr.x + next.x) / 2;
          const midY = (curr.y + next.y) / 2;
          if (p === 0) {
            ctx.moveTo(midX, midY);
          } else {
            ctx.quadraticCurveTo(curr.x, curr.y, midX, midY);
          }
        }

        ctx.closePath();
        ctx.fill();
      }

      for (let i = 0; i < 15; i++) {
        const sx = rand() * width;
        const sy = rand() * height;
        const sr = 10 + rand() * 30;
        ctx.fillStyle = BLACK;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d', { alpha: false });

      function resize() {
        const w = Math.max(window.screen.width, window.innerWidth, document.documentElement.clientWidth);
        const h = Math.max(window.screen.height, window.innerHeight, document.documentElement.clientHeight);

        canvas.width = w;
        canvas.height = h;

        const wrapper = document.getElementById('bg-canvas-wrapper');
        wrapper.style.width = w + 'px';
        wrapper.style.height = h + 'px';

        drawCowPattern(ctx, w, h, 12345);
      }

      resize();

      window.addEventListener('resize', resize);
      window.addEventListener('orientationchange', function () {
        setTimeout(resize, 300);
      });
      window.visualViewport && window.visualViewport.addEventListener('resize', function () {
        setTimeout(resize, 100);
      });
    })();

    /* ── FUND WALLET LOGIC ── */
    (function () {
      const FEE_PERCENT = 0.05; // ₦50 charge expressed as 5% (e.g. ₦1,000 funding → ₦50 fee)

      const amountInput = document.getElementById('amountInput');
      const chips = document.querySelectorAll('.amount-chip');
      const sumAmount = document.getElementById('sumAmount');
      const sumFee = document.getElementById('sumFee');
      const sumTotal = document.getElementById('sumTotal');
      const submitBtn = document.getElementById('fundSubmitBtn');

      function formatNaira(value) {
        return '₦' + value.toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function updateSummary() {
        const raw = parseFloat(amountInput.value);
        const amount = isNaN(raw) || raw < 0 ? 0 : raw;
        const fee = amount * FEE_PERCENT;
        const total = amount + fee;

        sumAmount.textContent = formatNaira(amount);
        sumFee.textContent = formatNaira(fee);
        sumTotal.textContent = formatNaira(total);

        submitBtn.disabled = amount <= 0;

        chips.forEach(chip => {
          chip.classList.toggle('selected', parseFloat(chip.dataset.amount) === amount && amount > 0);
        });
      }

      amountInput.addEventListener('input', updateSummary);

      chips.forEach(chip => {
        chip.addEventListener('click', () => {
          amountInput.value = chip.dataset.amount;
          updateSummary();
        });
      });

      submitBtn.addEventListener('click', () => {
        if (submitBtn.disabled) return;
        // Hook Paystack integration here
        alert('Redirecting to Paystack to pay ' + sumTotal.textContent + '...');
      });

      updateSummary();
    })();

    /* ── BACK BUTTON ── */
    document.getElementById('backBtn').addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      }
    });
  </script>
</body>

</html>
